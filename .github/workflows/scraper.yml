name: Daily Taiwan Stock Scraper

on:
  schedule:
    # 台灣時間(UTC+8)下午 15:30 = UTC 07:30 (週一至週五)
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  build-and-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v3

      - name: ⚙️ 設定 Go 環境
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: 🚀 執行爬蟲程式
        # ⚠️ 修正點 1：直接進入 finish 資料夾即可
        working-directory: ./finish
        run: |
          go mod init quant-data || true
          go mod tidy
          go run Stock_TOP10.go

      - name: 💾 將產生的 CSV 存回 GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # ⚠️ 修正點 2：路徑改為 finish/*.csv
          git add finish/*.csv
          git commit -m "🤖 自動更新: 台股每日 TOP10 潛力股資料 [skip ci]" || exit 0
          git push
